name: ✨ Feature Request
description: Suggest a new feature or improvement for Notinhas
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Notinhas prioritizes the visual-handoff loop (capture → numbered pins/notes → clipboard export). Please describe how your idea supports that workflow.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: Is your feature request related to a problem? Describe the pain point or motivation.
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or feature you'd like to see.
      placeholder: It would be great if Notinhas could...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: Which part of Notinhas does this relate to?
      options:
        - Capture / Screenshots
        - Notinhas pins & notes
        - Annotate / Export / Clipboard
        - Quick Access
        - Capture History
        - Shortcuts / URL scheme
        - Preferences / Configuration
        - Optional Video module
        - Migration / Upgrade
        - Other
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / References
      description: If you have mockups, sketches, or references, attach them here.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, use cases, or information about the feature request.
    validations:
      required: false
