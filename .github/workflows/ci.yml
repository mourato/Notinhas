name: CI Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Verify localization catalogs
        run: |
          set -euo pipefail
          mkdir -p build/swift-module-cache
          swift -module-cache-path build/swift-module-cache tools/localization/CatalogTool.swift verify

      - name: Run tests
        env:
          NOTINHAS_CI_SKIP_TESTS: |
            NotinhasTests/GoogleDriveTests
            NotinhasTests/DatabaseManagerTests
            NotinhasTests/QuickAccessCoreTests/testQuickAccessCountdownTimer_pauseResumePreservesRemainingTime
            NotinhasTests/QuickAccessCoreTests/testQuickAccessCountdownTimer_cancelPreventsExpiration
            NotinhasTests/QuickAccessCoreTests/testQuickAccessTrackpadSwipeModeStore_persistsMode
            NotinhasTests/QuickAccessCoreTests/testQuickAccessTrackpadSwipeModeStore_resetToDefault
            NotinhasTests/OCRRecognitionTests
            NotinhasTests/SmartElementCaptureControllerTests
            NotinhasTests/SmartElementWindowOwnerResolverTests
            NotinhasTests/SmartElementQueryServiceTests
            NotinhasTests/SandboxOffDataMigrationServiceTests
            NotinhasTests/AppStatusBarControllerTests
            NotinhasTests/RecordingAudioLevelMeterTests
            NotinhasTests/CaptureViewModelTests/testHiddenWindowSession_restore_postsSyntheticMouseMovedEvent
            NotinhasTests/AnnotateExportSaveTests/testCopyToClipboardRunsWithoutCrashing
            NotinhasTests/AnnotateExportSaveTests/testSaveAsIsCoveredByManualInteractionOnly
            NotinhasTests/AnnotateBackgroundRedactionTests/testApplyBackgroundCutoutStartsProcessingOnSupportedOS
            NotinhasTests/AnnotateBackgroundRedactionTests/testAutoRedactSensitiveDataStartsScan
            NotinhasTests/AnnotateMockupTests/testMockupExporterRenderProducesImageWithSourceImage
            NotinhasTests/AnnotateBlurCacheManagerTests/testGetCachedBlur_nonBlockingSchedulesRender
            NotinhasTests/AreaSelectionMultiMonitorReconciliationTests/testMouseExited_hidesCoordinateIndicatorAndMagnifier
            NotinhasTests/AreaSelectionMultiMonitorReconciliationTests/testIsMouseOver_evaluatesFrameAndVisibility
            NotinhasTests/PersistedCombineSessionTests/testCaptureStitchSaveReopen_persistsStitchEverywhere
        run: |
          set -euo pipefail
          mkdir -p build
          rm -rf build/ci-test.xcresult
          test_args=()
          if [[ -n "${NOTINHAS_CI_SKIP_TESTS:-}" ]]; then
            skip_tests="${NOTINHAS_CI_SKIP_TESTS//$'\n'/ }"
            skip_tests="${skip_tests//,/ }"
            skip_tests="${skip_tests//;/ }"
            echo "Skipping XCTest identifiers from NOTINHAS_CI_SKIP_TESTS:"
            for test_id in $skip_tests; do
              [[ -z "$test_id" ]] && continue
              echo "  - $test_id"
              test_args+=("-skip-testing:$test_id")
            done
          fi

          if ! xcodebuild \
            -project Notinhas.xcodeproj \
            -scheme Notinhas \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/ci-test.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            "${test_args[@]}" \
            test > build/ci-test.log 2>&1; then
            echo "::group::Likely test failures"
            grep -E "Test case '.*' failed|Failing tests:|\\*\\* TEST FAILED \\*\\*|error:" build/ci-test.log || true
            echo "::endgroup::"
            tail -200 build/ci-test.log
            exit 1
          fi

          tail -20 build/ci-test.log

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-diagnostics
          path: |
            build/ci-test.log
            build/ci-test.xcresult

      - name: Build
        run: |
          set -euo pipefail
          mkdir -p build

          if ! xcodebuild \
            -project Notinhas.xcodeproj \
            -scheme Notinhas \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build > build/ci-build.log 2>&1; then
            tail -100 build/ci-build.log
            exit 1
          fi

          tail -20 build/ci-build.log

      - name: Verify app bundle
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/Notinhas.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Notinhas.app not found at expected path"
            exit 1
          fi
          echo "Build successful: $APP_PATH"
