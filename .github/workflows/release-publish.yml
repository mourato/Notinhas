name: Release Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    # Only run when a release PR is merged (not just closed)
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      HAS_DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_P12 != '' && secrets.DEVELOPER_ID_PASSWORD != '' && 'true' || 'false' }}
      HAS_SELF_SIGNED_CERT: ${{ secrets.SELF_SIGNED_CERT_P12 != '' && secrets.SELF_SIGNED_CERT_PASSWORD != '' && 'true' || 'false' }}
      HAS_NOTARIZATION_CREDENTIALS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_ID_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && 'true' || 'false' }}
      ALLOW_ADHOC_RELEASE: ${{ (vars.ALLOW_ADHOC_RELEASE == 'true' || secrets.ALLOW_ADHOC_RELEASE == 'true') && 'true' || 'false' }}
      ALLOW_SIGNING_IDENTITY_CHANGE: ${{ (vars.ALLOW_SIGNING_IDENTITY_CHANGE == 'true' || secrets.ALLOW_SIGNING_IDENTITY_CHANGE == 'true') && 'true' || 'false' }}

    steps:
      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Release version: v${VERSION}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog
        id: changelog
        run: |
          mkdir -p build
          # Extract the latest version entry from CHANGELOG.md
          awk '/^## \[/{if(found) exit; found=1; next} found' CHANGELOG.md > build/changelog.md
          echo "changelog_path=build/changelog.md" >> "$GITHUB_OUTPUT"
          echo "--- Changelog content ---"
          cat build/changelog.md

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Build archive
        run: |
          set -euo pipefail
          mkdir -p build

          if ! xcodebuild archive \
            -project Snapzy.xcodeproj \
            -scheme Snapzy \
            -configuration Release \
            -archivePath build/Snapzy.xcarchive \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            > build/archive.log 2>&1; then
            tail -100 build/archive.log
            exit 1
          fi

          tail -20 build/archive.log

          if [ ! -d "build/Snapzy.xcarchive" ]; then
            echo "::error::Archive not found at build/Snapzy.xcarchive"
            exit 1
          fi

      - name: Guard release signing strategy
        run: |
          set -euo pipefail

          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            echo "Release signing strategy: Developer ID"
            exit 0
          fi

          if [ "${HAS_SELF_SIGNED_CERT}" = "true" ]; then
            echo "Release signing strategy: stable self-signed certificate"
            exit 0
          fi

          if [ "${ALLOW_ADHOC_RELEASE}" = "true" ]; then
            echo "::warning::ALLOW_ADHOC_RELEASE=true — proceeding with ad-hoc release signing by explicit override"
            exit 0
          fi

          echo "::error::Release publish requires Developer ID or SELF_SIGNED_CERT_* secrets. Ad-hoc fallback is disabled by default."
          exit 1

      # --- Code Signing (conditional) ---
      # Priority: Developer ID > Self-signed cert > Ad-hoc
      # Self-signed cert preserves TCC permissions across manual reinstalls
      # without requiring Apple Developer Program enrollment.
      - name: Import signing certificate
        if: env.HAS_DEVELOPER_ID_CERT == 'true' || env.HAS_SELF_SIGNED_CERT == 'true'
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
          SELF_SIGNED_CERT_P12: ${{ secrets.SELF_SIGNED_CERT_P12 }}
          SELF_SIGNED_CERT_PASSWORD: ${{ secrets.SELF_SIGNED_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            echo "Importing Developer ID certificate..."
            echo "$DEVELOPER_ID_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
            security import $RUNNER_TEMP/certificate.p12 -P "$DEVELOPER_ID_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          elif [ "${HAS_SELF_SIGNED_CERT}" = "true" ]; then
            echo "Importing self-signed certificate (TCC-preserving fallback)..."
            echo "$SELF_SIGNED_CERT_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
            security import $RUNNER_TEMP/certificate.p12 -P "$SELF_SIGNED_CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
            # Note: no `security add-trusted-cert` here — it requires interactive admin
            # password and hangs in CI. The -A and -T flags are sufficient for codesign.
          fi

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Log the signing identity that will be used
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Export app
        run: |
          set -euo pipefail
          ARCHIVE_PATH="build/Snapzy.xcarchive"

          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not found at $ARCHIVE_PATH. Check the Build archive step output."
            exit 1
          fi

          # Always extract from archive manually — xcodebuild -exportArchive
          # with automatic signing doesn't work in headless CI.
          ditto "$ARCHIVE_PATH/Products/Applications/Snapzy.app" build/Snapzy.app

          APP_PATH="build/Snapzy.app"

          # Determine signing identity and timestamp flag
          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            # Discover Developer ID identity from keychain
            SIGN_IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            TIMESTAMP_FLAG="--timestamp"
            echo "Signing with Developer ID: $SIGN_IDENTITY"
          elif [ "${HAS_SELF_SIGNED_CERT}" = "true" ]; then
            SIGN_IDENTITY="Snapzy Self-Signed"
            TIMESTAMP_FLAG="--timestamp=none"
            echo "Signing with self-signed certificate: $SIGN_IDENTITY"
          else
            SIGN_IDENTITY="-"
            TIMESTAMP_FLAG="--timestamp=none"
            echo "::warning::Signing ad-hoc — TCC and Keychain trust may be lost after update"
          fi

          # Clean extended attributes before signing
          xattr -rc "$APP_PATH"

          # Pre-process entitlements (Xcode variable substitution)
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Contents/Info.plist")
          PROCESSED_ENTITLEMENTS="$RUNNER_TEMP/processed-entitlements.plist"
          sed "s/\$(PRODUCT_BUNDLE_IDENTIFIER)/$BUNDLE_ID/g" Snapzy/Snapzy.entitlements > "$PROCESSED_ENTITLEMENTS"
          echo "Processed entitlements with bundle ID: $BUNDLE_ID"

          # Sign main app bundle (with hardened runtime!)
          codesign --force --sign "$SIGN_IDENTITY" \
            -o runtime \
            --entitlements "$PROCESSED_ENTITLEMENTS" \
            $TIMESTAMP_FLAG \
            "$APP_PATH"

      - name: Verify exported app bundle
        run: |
          set -euo pipefail
          APP_PATH="build/Snapzy.app"

          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH"
          codesign -d --entitlements - "$APP_PATH" > build/exported-app-entitlements.plist

          if grep -q "com.apple.security.app-sandbox" build/exported-app-entitlements.plist; then
            echo "::warning::App sandbox entitlement found in exported app, but app is configured to be unsandboxed"
          else
            echo "App sandbox entitlement is not present (correct for unsandboxed release)"
          fi

          # Verify hardened runtime flag
          HR_FLAGS=$(codesign -dvvv "$APP_PATH" 2>&1 | grep "flags=" || true)
          if ! echo "$HR_FLAGS" | grep -q "runtime"; then
            echo "::error::Hardened runtime not enabled on $APP_PATH"
            exit 1
          fi
          echo "Hardened runtime verified: $HR_FLAGS"

      - name: Capture candidate signing metadata
        run: |
          set -euo pipefail
          APP_PATH="build/Snapzy.app"

          codesign -dr - "$APP_PATH" 2>&1 | sed -n 's/^designated => //p' > build/candidate-designated-requirement.txt
          codesign -dvv "$APP_PATH" > build/candidate-signature.txt 2>&1 || true

          if [ ! -s build/candidate-designated-requirement.txt ]; then
            echo "::error::Failed to extract candidate designated requirement"
            exit 1
          fi

          echo "--- Candidate designated requirement ---"
          cat build/candidate-designated-requirement.txt

      - name: Compare signing identity with previous release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p build/previous-release

          PREVIOUS_TAG=$(gh release list --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "null" ]; then
            echo "No previous GitHub release found. Skipping signing comparison."
            exit 0
          fi

          echo "Comparing candidate app against release: $PREVIOUS_TAG"
          if ! gh release download "$PREVIOUS_TAG" -p 'Snapzy-v*.dmg' -D build/previous-release; then
            echo "::warning::Failed to download previous release asset. Skipping signing comparison."
            exit 0
          fi

          PREVIOUS_DMG=$(find build/previous-release -name 'Snapzy-v*.dmg' -type f | head -1)
          if [ -z "$PREVIOUS_DMG" ]; then
            echo "::warning::Previous release has no Snapzy DMG asset. Skipping signing comparison."
            exit 0
          fi

          MOUNT_POINT=$(mktemp -d /tmp/snapzy-previous-release.XXXXXX)
          cleanup() {
            hdiutil detach "$MOUNT_POINT" -quiet >/dev/null 2>&1 || true
            rm -rf "$MOUNT_POINT"
          }
          trap cleanup EXIT

          hdiutil attach "$PREVIOUS_DMG" -mountpoint "$MOUNT_POINT" -nobrowse -quiet
          if [ ! -d "$MOUNT_POINT/Snapzy.app" ]; then
            echo "::warning::Previous release DMG does not contain Snapzy.app at root. Skipping signing comparison."
            exit 0
          fi

          ditto "$MOUNT_POINT/Snapzy.app" build/previous-release/Snapzy.app

          codesign -dr - build/previous-release/Snapzy.app 2>&1 | sed -n 's/^designated => //p' > build/previous-designated-requirement.txt
          codesign -dvv build/previous-release/Snapzy.app > build/previous-signature.txt 2>&1 || true

          if [ ! -s build/previous-designated-requirement.txt ]; then
            echo "::warning::Failed to extract previous release designated requirement. Skipping signing comparison."
            exit 0
          fi

          echo "--- Previous designated requirement ---"
          cat build/previous-designated-requirement.txt

          if diff -u build/previous-designated-requirement.txt build/candidate-designated-requirement.txt; then
            echo "Designated requirement matches previous release."
            exit 0
          fi

          if [ "${ALLOW_SIGNING_IDENTITY_CHANGE}" = "true" ]; then
            echo "::warning::ALLOW_SIGNING_IDENTITY_CHANGE=true — proceeding despite designated requirement drift"
            exit 0
          fi

          echo "::error::Candidate designated requirement differs from previous release. Set ALLOW_SIGNING_IDENTITY_CHANGE=true only for intentional signing migrations."
          exit 1

      - name: Install create-dmg
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg

      - name: Create DMG
        run: |
          set -euo pipefail
          APP_PATH="build/Snapzy.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Snapzy.app not found at expected path: $APP_PATH"
            exit 1
          fi

          DMG_NAME="Snapzy-v${{ steps.version.outputs.version }}.dmg"

          create-dmg \
            --volname "Snapzy" \
            --background "assets/dmg-background.png" \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "Snapzy.app" 180 170 \
            --app-drop-link 480 170 \
            --no-internet-enable \
            "build/${DMG_NAME}" \
            "$APP_PATH"

          echo "dmg_path=build/${DMG_NAME}" >> "$GITHUB_ENV"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_ENV"

      # --- Notarization (conditional, for when Apple Developer account is available) ---
      - name: Notarize DMG
        if: env.HAS_DEVELOPER_ID_CERT == 'true' && env.HAS_NOTARIZATION_CREDENTIALS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          # Submit and capture output for potential log retrieval
          SUBMIT_OUTPUT=$(xcrun notarytool submit "${{ env.dmg_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 15m 2>&1) || {
            SUBMIT_EXIT=$?
            echo "$SUBMIT_OUTPUT"

            # Extract submission ID for log retrieval
            SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

            if [ -n "$SUBMISSION_ID" ]; then
              echo "::group::Notarization log (submission $SUBMISSION_ID)"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>&1 || echo "Failed to retrieve notarization log"
              echo "::endgroup::"
            else
              echo "::warning::Could not extract submission ID for log retrieval"
            fi

            exit $SUBMIT_EXIT
          }

          echo "$SUBMIT_OUTPUT"
          xcrun stapler staple "${{ env.dmg_path }}"
          echo "DMG notarized and stapled successfully"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 "${{ env.dmg_path }}" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Append release artifact note
        run: |
          if [ "${HAS_DEVELOPER_ID_CERT}" = "true" ] && [ "${HAS_NOTARIZATION_CREDENTIALS}" = "true" ]; then
            NOTE="- Release artifact: Developer ID signed and notarized."
          elif [ "${HAS_DEVELOPER_ID_CERT}" = "true" ]; then
            NOTE="- Release artifact: Developer ID signed, not notarized."
          elif [ "${HAS_SELF_SIGNED_CERT}" = "true" ]; then
            NOTE="- Release artifact: self-signed certificate, not notarized. Permissions persist across updates. Install to /Applications before first launch."
          elif [ "${ALLOW_ADHOC_RELEASE}" = "true" ]; then
            NOTE="- Release artifact: ad-hoc signed by explicit override. Permissions and keychain trust may be lost after updates."
          else
            echo "::error::Unexpected release note state: no approved signing strategy resolved"
            exit 1
          fi

          {
            printf "\n\n"
            printf "### Distribution Notes\n\n"
            printf "%s\n" "$NOTE"
          } >> build/changelog.md

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapzy-v${{ steps.version.outputs.version }}
          path: ${{ env.dmg_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.changelog_path }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_beta == 'true' }}
          files: ${{ env.dmg_path }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Homebrew cask and README track stable releases only — skipped for beta
      - name: Update Homebrew cask
        if: steps.version.outputs.is_beta != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/snapzy.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/snapzy.rb

      - name: Update README install version
        if: steps.version.outputs.is_beta != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s|/Snapzy/v[0-9][0-9.]*\/install.sh|/Snapzy/v${VERSION}/install.sh|g" README.md

      - name: Commit cask and readme update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/snapzy.rb README.md
          if git diff --cached --quiet; then
            echo "No cask/readme changes to commit"
            exit 0
          fi
          git commit -m "chore: update cask and readme for v${{ steps.version.outputs.version }}"
          git push origin main
